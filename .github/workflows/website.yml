name: Deploy Website

on:
  push:
    branches:
      - main
      - website
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./website

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install

      - name: Build with VuePress
        run: |
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/docs/.vuepress/dist


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build

    runs-on: ubuntu-latest

    name: Deploy

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
