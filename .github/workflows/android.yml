name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "manager/app/src/**/*.kt"
      - "manager/build.gradle.kts"
      - "manager/gradle/libs.versions.toml"
      - "manager/app/src/**/*.c"
      - "userspace/ncore/**/**/*.rs"
  pull_request:
    branches: [ "main" ]
    paths:
      - "manager/app/src/**/*.kt"
      - "manager/build.gradle.kts"
      - "manager/gradle/libs.versions.toml"
      - "manager/app/src/**/*.c"
      - "userspace/ncore/**/**/*.rs"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle
        
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: |
          aarch64-linux-android
          x86_64-linux-android

    - name: Build Rust CLI (cross-compile manually)
      env:
        API_LEVEL: 29
      run: |
        NDK_TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
        NDK_SYSROOT="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
        echo "$NDK_TOOLCHAIN" >> "$GITHUB_PATH"

        # aarch64
        export CC_aarch64_linux_android="${NDK_TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang"
        export CXX_aarch64_linux_android="${NDK_TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++"
        export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${CC_aarch64_linux_android}"
        export BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android="--sysroot=${NDK_SYSROOT} --target=aarch64-linux-android${API_LEVEL}"

        # x86_64
        export CC_x86_64_linux_android="${NDK_TOOLCHAIN}/x86_64-linux-android${API_LEVEL}-clang"
        export CXX_x86_64_linux_android="${NDK_TOOLCHAIN}/x86_64-linux-android${API_LEVEL}-clang++"
        export AR_x86_64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
        export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="${CC_x86_64_linux_android}"
        export BINDGEN_EXTRA_CLANG_ARGS_x86_64_linux_android="--sysroot=${NDK_SYSROOT} --target=x86_64-linux-android${API_LEVEL}"

        cargo build --release --target aarch64-linux-android
        cargo build --release --target x86_64-linux-android

        mkdir -p manager/app/src/main/jniLibs/arm64-v8a
        mkdir -p manager/app/src/main/jniLibs/x86_64
        cp target/aarch64-linux-android/release/ncore manager/app/src/main/jniLibs/arm64-v8a/libncore.so
        cp target/x86_64-linux-android/release/ncore manager/app/src/main/jniLibs/x86_64/libncore.so
          
    - name: Decode Release Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > manager/release.keystore
        
    - name: Cache OMVLL
      uses: actions/cache@v4
      with:
        path: manager/app/src/main/lib/omvll-ndk.so
        key: omvll-linux-latest
        
    - name: Download OMVLL
      run: |
        mkdir -p manager/app/src/main/lib

        echo "Fetching latest OMVLL release..."

        URL=$(curl -s \
          https://api.github.com/repos/open-obfuscator/o-mvll/releases/latest \
          | jq -r '.assets[]
            | select(.name | contains("linux"))
            | select(.name | endswith(".tar.gz"))
            | .browser_download_url' \
          | head -n 1)

        echo "Downloading:"
        echo "$URL"

        curl -L "$URL" \
          -o /tmp/omvll.tar.gz

        mkdir -p /tmp/omvll

        tar -xzf /tmp/omvll.tar.gz \
          -C /tmp/omvll

        find /tmp/omvll -name "omvll-ndk.so"

        cp "$(find /tmp/omvll -name 'omvll-ndk.so' | head -n 1)" \
          manager/app/src/main/lib/omvll-ndk.so

        ls -lh manager/app/src/main/lib/omvll-ndk.so

    - name: Build with Gradle
      working-directory: manager
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v7
      with:
        name: release
        path: manager/app/build/outputs/apk/release/*.apk
